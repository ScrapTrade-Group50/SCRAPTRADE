# ══════════════════════════════════════════════════════════════
#  SCRAPTRADE - Environment Variable Template
#  Copy this file, rename to application-dev.properties,
#  and fill in your own values. NEVER commit real secrets.
# ══════════════════════════════════════════════════════════════

# ── Database ───────────────────────────────────────────────────
SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/scraptrade
SPRING_DATASOURCE_USERNAME=your_db_user
SPRING_DATASOURCE_PASSWORD=your_db_password

# ── JPA / Hibernate ────────────────────────────────────────────
SPRING_JPA_HIBERNATE_DDL_AUTO=update
SPRING_JPA_SHOW_SQL=false

# ── Security ───────────────────────────────────────────────────
JWT_SECRET_KEY=insert_your_random_64_character_secret_string_here

# ── Paystack (Mobile Money) ────────────────────────────────────
PAYSTACK_SECRET_KEY=sk_test_your_paystack_key_here
PAYSTACK_BASE_URL=https://api.paystack.co

# ── Cloudinary (Image Uploads) ─────────────────────────────────
CLOUDINARY_URL=cloudinary://api_key:api_secret@cloud_name
CLOUDINARY_CLOUD_NAME=your_cloud_name
CLOUDINARY_API_KEY=your_api_key
CLOUDINARY_API_SECRET=your_api_secret

# ── Server ─────────────────────────────────────────────────────
SERVER_PORT=8080