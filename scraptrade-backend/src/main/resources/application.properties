spring.application.name=scraptrade-backend

# Local secrets: copy application-local.properties.example → application-local.properties
# Production: set DATABASE_PASSWORD, CLOUDINARY_*, JWT_SECRET env vars (Spring relaxed binding)
spring.config.import=optional:file:./application-local.properties

# Database — password comes from application-local.properties or DATABASE_PASSWORD env var
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/scraptrade_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Payment — simulated (default), paystack, or momo (MTN MoMo Collection API)
payment.provider=${PAYMENT_PROVIDER:simulated}
payment.paystack.secret-key=${PAYSTACK_SECRET_KEY:}
payment.paystack.public-key=${PAYSTACK_PUBLIC_KEY:}
payment.paystack.callback-url=${PAYSTACK_CALLBACK_URL:scraptrade://checkout}
# Skip Paystack transfers on gate-pass scan (dev Starter accounts cannot payout)
payment.paystack.skip-transfers=${PAYSTACK_SKIP_TRANSFERS:false}
payment.momo.api-user=${MOMO_API_USER:}
payment.momo.api-key=${MOMO_API_KEY:}
payment.momo.subscription-key=${MOMO_SUBSCRIPTION_KEY:}
payment.momo.environment=${MOMO_ENV:sandbox}
payment.momo.callback-url=${MOMO_CALLBACK_URL:}

# Password reset — expose token in API response only when true (dev)
app.password-reset.expose-token=${PASSWORD_RESET_EXPOSE_TOKEN:false}
# Public web URL for reset links in emails, e.g. https://app.scraptrade.com/reset-password
app.password-reset.web-reset-url=${PASSWORD_RESET_WEB_URL:}

# Transactional email (SendGrid SMTP in production)
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:SCRAPTRADE <noreply@scraptrade.com>}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Support contact — shown on the mobile Help & Support screen
app.support.email=${SUPPORT_EMAIL:support@scraptrade.com}
app.support.phone=${SUPPORT_PHONE:+233302123456}
app.support.whatsapp=${SUPPORT_WHATSAPP:https://wa.me/233302123456}
app.support.hours=${SUPPORT_HOURS:Mon-Sat, 8am-6pm GMT}
